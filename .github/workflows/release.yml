name: Build desktop installers

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: "development"
        type: choice
        options:
          - "development"
          - "production"
      platform:
        description: "Platform to package"
        required: true
        default: "windows"
        type: choice
        options:
          - "windows"
          - "linux"
          - "macos"
          - "all"
      publish:
        description: "Publish to GitHub Releases"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} (${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'auto' }})
    runs-on: ${{ matrix.os }}

    # IMPORTANT:
    # In a GitHub Actions `if:` field, the value is already treated as an expression.
    # Do not wrap this block with `${{ ... }}`.
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      contains(github.event.head_commit.message, '[release]')

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage deb --x64
          - name: windows
            os: windows-latest
            command: npx electron-builder --win nsis --x64
          - name: macos
            os: macos-latest
            command: npx electron-builder --mac dmg zip --x64 --arm64

    steps:
      - name: Skip unselected platform
        if: >
          github.event_name == 'workflow_dispatch' &&
          inputs.platform != 'all' &&
          inputs.platform != matrix.name
        shell: bash
        run: |
          echo "Skipping ${{ matrix.name }} because selected platform is '${{ inputs.platform }}'."
          exit 0

      - name: Checkout
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        uses: actions/checkout@v4

      - name: Use Node.js 22.12
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Linux packaging dependencies
        if: >
          runner.os == 'Linux' &&
          (github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name)
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Resolve build settings
        id: settings
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          REF="${{ github.ref }}"
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

          BUILD_MODE="development"
          PUBLISH_MODE="never"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            BUILD_MODE="${{ inputs.build_mode }}"
            if [[ "${{ inputs.publish }}" == "true" ]]; then
              PUBLISH_MODE="always"
            fi
          elif [[ "$REF" == refs/tags/v* ]]; then
            BUILD_MODE="production"
            PUBLISH_MODE="always"
          elif echo "$COMMIT_MESSAGE" | tr '[:upper:]' '[:lower:]' | grep -q '\[production\]'; then
            BUILD_MODE="production"
          fi

          if [[ "$BUILD_MODE" != "development" && "$BUILD_MODE" != "production" ]]; then
            echo "Unsupported build mode: $BUILD_MODE" >&2
            exit 1
          fi

          echo "build_mode=$BUILD_MODE" >> "$GITHUB_OUTPUT"
          echo "publish_mode=$PUBLISH_MODE" >> "$GITHUB_OUTPUT"

          echo "Resolved build mode: $BUILD_MODE"
          echo "Resolved publish mode: $PUBLISH_MODE"
          echo "Platform: ${{ matrix.name }}"

      - name: Install dependencies
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        run: npm ci

      - name: Verify offline SVG icons
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        run: npm run icons:verify

      - name: Build web and Electron outputs
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        run: npm run build:release:${{ steps.settings.outputs.build_mode }}

      - name: Package
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          ${{ matrix.command }} --publish "${{ steps.settings.outputs.publish_mode }}"

      - name: Create checksums
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        run: npm run release:checksum

      - name: Upload artifacts
        if: >
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.name
        uses: actions/upload-artifact@v4
        with:
          name: machine-interfacing-app-${{ matrix.name }}-${{ steps.settings.outputs.build_mode }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
            release/*.yaml
            release/SHA256SUMS.txt
          if-no-files-found: error
