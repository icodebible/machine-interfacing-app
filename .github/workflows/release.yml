name: Build desktop installers

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to GitHub Releases"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage deb --x64
          - name: windows
            os: windows-latest
            command: npx electron-builder --win nsis --x64
          - name: macos
            os: macos-latest
            command: npx electron-builder --mac dmg zip --x64 --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm install

      - name: Verify offline SVG icons
        run: npm run icons:verify

      - name: Build web and Electron outputs
        run: npm run build:release

      - name: Package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]]; then
            PUBLISH_MODE="always"
          elif [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
            PUBLISH_MODE="always"
          else
            PUBLISH_MODE="never"
          fi

          ${{ matrix.command }} --publish "${PUBLISH_MODE}"

      - name: Create checksums
        run: npm run release:checksum

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: machine-interfacing-app-${{ matrix.name }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
            release/*.yaml
            release/SHA256SUMS.txt
          if-no-files-found: error
