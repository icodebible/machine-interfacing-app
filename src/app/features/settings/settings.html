<mat-card class="card" *ngIf="mode === 'change-password'">
  <mat-card-title>Change password</mat-card-title>
  <mat-card-subtitle>
    For security, you must change your password before continuing.
  </mat-card-subtitle>

  <div *ngIf="error" class="error">{{ error }}</div>

  <form (ngSubmit)="onChangePassword()" class="form">
    <mat-form-field appearance="outline">
      <mat-label>New password</mat-label>
      <input matInput type="password" [(ngModel)]="newPassword" name="newPassword" required minlength="8" />
      <mat-hint>Minimum 8 characters</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Confirm password</mat-label>
      <input matInput type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required minlength="8" />
    </mat-form-field>

    <button mat-flat-button color="primary" type="submit" [disabled]="loading">
      {{ loading ? 'Saving...' : 'Update password' }}
    </button>
  </form>
</mat-card>

<!-- If not forced mode, Settings can later show Theme / About / etc -->
<mat-card class="card" *ngIf="mode !== 'change-password'">
  <mat-card-title>Settings</mat-card-title>
  <mat-card-subtitle>More options will appear here (theme, about, etc.)</mat-card-subtitle>
</mat-card>
