<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Add Lab' : 'Edit Lab' }}</h2>

<div mat-dialog-content class="content" [formGroup]="form">
    <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" autocomplete="off" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" autocomplete="off" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Location</mat-label>
        <input matInput formControlName="location" autocomplete="off" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <input matInput formControlName="description" autocomplete="off" />
    </mat-form-field>
</div>

<div mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="form.invalid">
        Save
    </button>
</div>
