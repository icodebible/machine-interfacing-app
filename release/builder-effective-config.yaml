directories:
  output: release
  buildResources: build
appId: tz.ac.udsm.dhis.machineinterfacing
productName: Machine Interfacing App
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
files:
  - filter:
      - dist/**
      - dist-electron/**
      - package.json
asar: true
npmRebuild: true
extraResources:
  - from: electron/resources
    to: resources
    filter:
      - '**/*'
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icons/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: false
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icons/512x512.png
  category: Utility
  maintainer: UDSM DHIS2 Lab <dhis2lab@udsm.ac.tz>
  vendor: UDSM DHIS2 Lab
  synopsis: Laboratory analyzer machine interfacing platform
icon: build/icons/512x512.png
publish:
  - provider: github
    owner: icodebible
    repo: machine-interfacing-app
    releaseType: release
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/serialport/**/*
  - node_modules/@serialport/**/*
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Machine Interfacing App
electronVersion: 39.7.0
